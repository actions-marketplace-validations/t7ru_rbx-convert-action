name: "rbx-convert"
description: "Convert Roblox XML <-> binary formats (rbxlx <-> rbxl, rbxmx <-> rbxm) using rbx-util"

inputs:
  input:
    description: "Path to input file (relative to workspace)"
    required: true
  output:
    description: "Path to output file (relative to workspace)"
    required: true
  verbosity:
    description: "Verbosity flags forwarded to rbx-util (for example: -v or -vv)"
    required: false
    default: ""
  rbx-dom-rev:
    description: "Git revision (commit SHA or tag) of rbx-dom to build rbx-util from"
    required: false
    default: "2bac02a"

runs:
  using: "composite"
  steps:
    - name: Install rbx-util
      shell: bash
      run: |
        mkdir -p ~/.cargo/bin
        BASE_URL="https://github.com/t7ru/rbx-convert-action/releases/download/binaries-${{ inputs.rbx-dom-rev }}"

        if [ "$RUNNER_OS" == "Windows" ]; then
          curl -fL "$BASE_URL/rbx-util-windows.exe" -o ~/.cargo/bin/rbx-util.exe
        elif [ "$RUNNER_OS" == "macOS" ]; then
          curl -fL "$BASE_URL/rbx-util-macos" -o ~/.cargo/bin/rbx-util
          chmod +x ~/.cargo/bin/rbx-util
        else
          curl -fL "$BASE_URL/rbx-util-linux" -o ~/.cargo/bin/rbx-util
          chmod +x ~/.cargo/bin/rbx-util
        fi

    - name: Convert file
      shell: bash
      run: |
        rbx-util convert ${{ inputs.verbosity }} \
          "${{ github.workspace }}/${{ inputs.input }}" \
          "${{ github.workspace }}/${{ inputs.output }}"

branding:
  icon: package
  color: yellow
